# HMR-RAG — crawl sources manifest
# ---------------------------------------------------------------------------
# Edit this file to ADD or REMOVE sources, then run the "Crawl sources" GitHub
# Action (Actions tab -> Crawl sources -> Run workflow). Crawling is manual-
# trigger only — nothing runs on a schedule.
#
# Each source becomes a cleaned markdown file at:
#     <brand>/<category>/<slug>.md
# with YAML frontmatter (source, brand, category, model, crawled). Re-running a
# source overwrites its file with a fresh crawl.
#
# Fields:
#   url       (required)  the page to crawl
#   brand     (required)  apple | samsung | xiaomi | other
#   category  (required)  specs | howto | price | registry | other
#   model     (optional)  human label; for howto articles, the article title
#
# BEFORE ADDING A SOURCE, verify it actually returns HTTP 200:
#   curl -s -o /dev/null -w "%{http_code}" -m 20 -A "Mozilla/5.0" "<url>"
# Do NOT construct URLs from a pattern and assume they resolve. gsmarena numeric
# ids and support-article ids are not guessable; invented ones 404.
#
# RATE LIMIT — gsmarena.com throttles at roughly 1 request / 10-15s and escalates
# to a multi-hour IP ban on sustained bursts (observed: 429 with
# Retry-After: 36000). scripts/crawl.py throttles per host for exactly this
# reason. It also rejects bot-check interstitials, which gsmarena serves with an
# HTTP 200 and enough text to slip past a naive length check.
#
# Prefer samsung.com/us/support/* and mi.com/global/support/* over the regional
# mirrors — the mirrors carry the same articles under different slugs and would
# fill the corpus with near-duplicates.
# ---------------------------------------------------------------------------

sources:
