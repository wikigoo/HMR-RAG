name: Crawl sources

# Manual-only. Edit sources.yaml, then run this from the Actions tab
# (Actions -> Crawl sources -> Run workflow). Nothing runs on a schedule.

on:
  workflow_dispatch:
    inputs:
      only_brand:
        description: "Crawl only this brand (apple / samsung / xiaomi / other), or 'all'"
        required: false
        default: "all"

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    # gsmarena is throttled to 1 req / 15s (it IP-bans on bursts), so a large
    # specs sweep spends most of its wall-clock deliberately waiting.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install crawl4AI + browser
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt
          crawl4ai-setup

      # continue-on-error so that a systemic failure (e.g. a rate-limit ban part
      # way through) still lets us KEEP the pages that did come down. The job is
      # failed explicitly in the last step instead — we want the content AND the
      # red X, not one or the other.
      - name: Crawl
        id: crawl
        continue-on-error: true
        env:
          ONLY_BRAND: ${{ inputs.only_brand }}
        run: python scripts/crawl.py

      - name: Commit new/updated markdown
        if: always()
        run: |
          git config user.name  "hmr-rag-bot"
          git config user.email "hmr-rag-bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "crawl: update sources ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi

      - name: Fail the run if the crawl failed systemically
        if: steps.crawl.outcome == 'failure'
        run: |
          echo "::error::crawl.py exited non-zero — too large a share of sources failed."
          echo "Anything that did crawl was still committed by the previous step."
          echo "Check the Crawl step log for BLOCKED (bot-check) or a rate-limit ban before re-running."
          exit 1
