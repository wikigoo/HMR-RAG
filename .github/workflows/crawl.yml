name: Crawl sources

# Manual-only. Edit sources.yaml, then run this from the Actions tab
# (Actions -> Crawl sources -> Run workflow). Nothing runs on a schedule.

on:
  workflow_dispatch:
    inputs:
      only_brand:
        description: "Crawl only this brand (apple / samsung / xiaomi / other), or 'all'"
        required: false
        default: "all"

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install crawl4AI + browser
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt
          crawl4ai-setup

      - name: Crawl
        env:
          ONLY_BRAND: ${{ inputs.only_brand }}
        run: python scripts/crawl.py

      - name: Commit new/updated markdown
        run: |
          git config user.name  "hmr-rag-bot"
          git config user.email "hmr-rag-bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "crawl: update sources ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
